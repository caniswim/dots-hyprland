##! Window Focus
bind = Alt, Tab, focuscurrentorlast  # Toggle between current and last window
# bind = Alt Shift, Up, hyprexpo:expo, toggle   # Show all windows (exposé) — plugin not loaded
# vim-style focus (hjkl) — overrides: bar toggle, osk toggle, lock
unbind = Super, J # was: Toggle bar
unbind = Super, K # was: Toggle on-screen keyboard
unbind = Super, L # was: Lock session
unbind = Super+Shift, L # was: Suspend system
bind = Super, H, movefocus, l # Focus left
bind = Super, J, movefocus, d # Focus down
bind = Super, K, movefocus, u # Focus up
bind = Super, L, movefocus, r # Focus right
bind = Super+Shift, H, movewindow, l # Move window left
bind = Super+Shift, J, movewindow, d # Move window down
bind = Super+Shift, K, movewindow, u # Move window up
bind = Super+Shift, L, movewindow, r # Move window right
# vim-style resize (hjkl)
binde = Ctrl+Shift, H, resizeactive, -40 0 # Resize left
binde = Ctrl+Shift, J, resizeactive, 0 40 # Resize down
binde = Ctrl+Shift, K, resizeactive, 0 -40 # Resize up
binde = Ctrl+Shift, L, resizeactive, 40 0 # Resize right
# vim-style swap columns
bind = Super+Ctrl, H, layoutmsg, swapcol l # Swap column left
bind = Super+Ctrl, L, layoutmsg, swapcol r # Swap column right
# vim-style workspace navigation (vertical animation: J=next/down, K=prev/up)
bind = Super+Alt, J, workspace, r+1 # Next workspace
bind = Super+Alt, K, workspace, r-1 # Previous workspace
bind = Super+Ctrl, J, movetoworkspace, r+1 # Send window to next workspace
bind = Super+Ctrl, K, movetoworkspace, r-1 # Send window to previous workspace
# scrolling layout: promote window to own column
unbind = Super+Shift, P # was: Play/pause media
bind = Super+Shift, P, layoutmsg, promote # Extract window to its own column
bind = Super+Alt, H, layoutmsg, colresize -conf # Column width: shrink
bind = Super+Alt, L, layoutmsg, colresize +conf # Column width: grow

# Window management overrides
unbind = Super, D # was: Maximize (fullscreen 1)
bind = Super+Shift, F, fullscreen, 1 # Maximize (moved from Super+D)
bind = Super, D, global, quickshell:overviewWorkspacesToggle # Toggle overview (same as Super+Tab)

# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above

##! Gaps (workspace ativo)
# Shift tiling with WASD (moves all windows in direction)
unbind = Super+Shift, S # was: Screenshot region
unbind = Super+Shift, A # was: Google Lens
unbind = Super+Alt, S # was: Send to scratchpad
bind = Super+Alt, S, global, quickshell:regionScreenshot # Screen snip (moved from Super+Shift+S)
bind = Super+Alt, S, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || hyprshot --freeze --clipboard-only --mode region --silent # [hidden] Screen snip fallback
bind = Super+Alt, A, global, quickshell:regionSearch # Google Lens (moved from Super+Shift+A)
bind = Super+Alt, A, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || ~/.config/hypr/hyprland/scripts/snip_to_search.sh # [hidden] Google Lens fallback
binde = Super+Shift, W, exec, ~/.config/hypr/scripts/adjust-gaps.sh u # Shift tiling up
binde = Super+Shift, S, exec, ~/.config/hypr/scripts/adjust-gaps.sh d # Shift tiling down
binde = Super+Shift, A, exec, ~/.config/hypr/scripts/adjust-gaps.sh l # Shift tiling left
binde = Super+Shift, D, exec, ~/.config/hypr/scripts/adjust-gaps.sh r # Shift tiling right
# vim-style dynamic gap control (step 20px)
binde = Super+Shift+Alt, H, exec, ~/.config/hypr/scripts/adjust-gaps.sh h + # Increase horizontal gaps
binde = Super+Shift+Alt, L, exec, ~/.config/hypr/scripts/adjust-gaps.sh h - # Decrease horizontal gaps
binde = Super+Shift+Alt, K, exec, ~/.config/hypr/scripts/adjust-gaps.sh v + # Increase vertical gaps
binde = Super+Shift+Alt, J, exec, ~/.config/hypr/scripts/adjust-gaps.sh v - # Decrease vertical gaps
bind = Super, F1, exec, hyprctl keyword workspace "$(hyprctl activeworkspace -j | jq -r '.id'), gapsout:80 80 80 80" # Default uniforme
bind = Super, F2, exec, hyprctl keyword workspace "$(hyprctl activeworkspace -j | jq -r '.id'), gapsout:80 450 80 430" # Gaps grandes ambos lados
bind = Super, F3, exec, hyprctl keyword workspace "$(hyprctl activeworkspace -j | jq -r '.id'), gapsout:80 20 80 430" # Gap grande só esquerda
bind = Super, F4, exec, hyprctl keyword workspace "$(hyprctl activeworkspace -j | jq -r '.id'), gapsout:80 10 80 10" # Quase sem gaps laterais
bind = Super, F5, exec, hyprctl keyword workspace "$(hyprctl activeworkspace -j | jq -r '.id'), gapsout:80 550 80 550" # Gaps simétricos grandes

##! Audio
# bind = Super Alt, E, global, quickshell:audioSwitcherToggle # Toggle Audio Switcher
bind = Super Alt, E, exec, ~/.config/hypr/scripts/wofi-eq-switcher.sh # EQ Switcher (Wofi)

##! Colors
bind = Super Alt, C, exec, ~/.config/quickshell/ii/scripts/colors/pick_accent.sh # Pick accent color from screen
bind = Super Alt Shift, C, global, quickshell:colorschemeSelectorToggle # Toggle Colorscheme Selector
