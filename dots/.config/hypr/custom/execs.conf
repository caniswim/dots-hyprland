# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Input method
# exec-once = fcitx5

# Cairo Dock (Mac OS X style dock)
#exec-once = cairo-dock -o

# Solaar - Logitech device manager (MX Master 3)
exec-once = solaar -w hide

# KDE Connect
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator

# GTK theme isolation (prevent KDE from overriding)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface font-name 'Rubik 11'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'SnowLeopard-Cursors'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 26
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
